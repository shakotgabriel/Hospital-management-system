spring.application.name=backend

# PostgreSQL datasource (required from .env)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# JWT settings (JWT_SECRET is required from .env)
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Bootstrap admin user (all required from .env)
app.admin.email=${ADMIN_EMAIL}
app.admin.password=${ADMIN_PASSWORD}
app.admin.first-name=${ADMIN_FIRST_NAME}
app.admin.last-name=${ADMIN_LAST_NAME}

# Error handling - throw exception for 404
spring.web.error.include-message=always
spring.web.error.include-binding-errors=always
spring.web.error.include-stacktrace=on-param
spring.web.error.include-exception=false

# Logging configuration
logging.level.root=INFO
logging.level.com.hospital.backend=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Session timeout (30 minutes)
server.servlet.session.timeout=30m

# Request/Response
spring.web.resources.add-mappings=false
